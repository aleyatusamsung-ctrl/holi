<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<title>SuperJump Bros</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a0a2e; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:monospace; }
h1 { color:#FFD700; font-size:1.8rem; letter-spacing:4px; text-shadow:3px 3px 0 #8B0000; margin-bottom:8px; }
#info { color:#aaa; font-size:0.8rem; margin-bottom:8px; }
#hud { display:flex; justify-content:space-between; width:800px; padding:6px 4px; color:#FFD700; font-size:0.95rem; letter-spacing:2px; }
#wrap { position:relative; }
canvas { border:4px solid #FFD700; display:block; }
#overlay {
  position:absolute; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#FFD700; gap:16px;
}
#overlay h2 { font-size:2rem; text-shadow:3px 3px 0 #8B0000; }
#overlay p { font-size:0.9rem; color:#ccc; }
.btn { background:#E83030; color:#fff; border:none; padding:12px 32px; font-family:monospace; font-size:1rem; letter-spacing:2px; cursor:pointer; border-radius:4px; border-bottom:4px solid #8B0000; }
.btn:hover { background:#ff4444; }
</style>
</head>
<body>
<h1>&#11088; SUPERJUMP BROS &#11088;</h1>
<div id="info">&#8592; &#8594; mover &nbsp;|&nbsp; &#8593; o ESPACIO saltar &nbsp;|&nbsp; salta encima de enemigos</div>
<div id="hud">
  <span>VIDAS: <span id="hLives">3</span></span>
  <span>MONEDAS: <span id="hCoins">0</span></span>
  <span>PUNTOS: <span id="hScore">0</span></span>
</div>
<div id="wrap">
  <canvas id="c" width="800" height="450"></canvas>
  <div id="overlay">
    <h2>&#11088; SUPERJUMP BROS &#11088;</h2>
    <p>Recoge monedas &middot; Evita o aplasta enemigos &middot; Llega a la bandera</p>
    <button class="btn" id="startBtn">&#9654; JUGAR</button>
  </div>
</div>
 
<script>
(function() {
 
var cvs = document.getElementById('c');
var ctx = cvs.getContext('2d');
var W = 800, H = 450, T = 40;
 
var K = {};
document.addEventListener('keydown', function(e) {
  K[e.code] = true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code)>=0) e.preventDefault();
});
document.addEventListener('keyup', function(e) { K[e.code] = false; });
 
var MAP = [
  '                                                            ',
  '                                                            ',
  '      BB    BB       BBBB          BB        BB    BB       ',
  '                                                            ',
  '   BBB         BBB          BBBB        BBB       BBB       ',
  '                                                            ',
  '                                                            ',
  '  PP                  PP               PP              PP   ',
  '  Pp                  Pp               Pp              Pp   ',
  '  Pp                  Pp               Pp              Pp   ',
  '  Pp                  Pp               Pp              Pp   ',
  'GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG'
];
 
var ROWS = MAP.length;
var COLS = MAP[0].length;
 
function tile(col, row) {
  if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return ' ';
  return MAP[row].charAt(col) || ' ';
}
function solid(col, row) {
  var t = tile(col, row);
  return t==='G'||t==='B'||t==='P'||t==='p';
}
 
var COIN_DEFS = [
  [6,1],[7,1],[12,1],[19,1],[20,1],[21,1],[26,1],[33,1],[40,1],[47,1],[53,1],
  [3,3],[9,3],[22,3],[35,3],[42,3],[49,3],[56,3]
];
var ENEMY_COLS = [6,13,19,25,31,37,43,49,55];
 
var player, enemies, coinList, cam, score, coins, lives, isRunning, frameCount;
 
function initState() {
  player = {x:60, y:320, w:30, h:38, vx:0, vy:0, onGround:false, facing:1, inv:0};
  enemies = ENEMY_COLS.map(function(col) {
    return {x:col*T, y:10*T-30, w:30, h:30, vx:-1.5, vy:0, onGround:false, alive:true, squish:0};
  });
  coinList = COIN_DEFS.map(function(c) {
    return {x:c[0]*T+8, y:c[1]*T+8, w:24, h:24, got:false};
  });
  cam=0; score=0; coins=0; lives=3; frameCount=0;
  updateHUD();
}
 
function updateHUD() {
  document.getElementById('hLives').textContent = lives;
  document.getElementById('hCoins').textContent = coins;
  document.getElementById('hScore').textContent = score;
}
 
var GRAV=0.52, JUMPV=-17, SPD=4;
 
function moveObj(o) {
  o.vy += GRAV;
  o.y += o.vy;
  var lc = Math.floor(o.x / T);
  var rc = Math.floor((o.x + o.w - 1) / T);
  if (o.vy > 0) {
    var br = Math.floor((o.y + o.h) / T);
    if (solid(lc,br) || solid(rc,br)) { o.y=br*T-o.h; o.vy=0; o.onGround=true; }
  } else if (o.vy < 0) {
    var tr = Math.floor(o.y / T);
    if (solid(lc,tr) || solid(rc,tr)) { o.y=(tr+1)*T; o.vy=0; }
  }
  var br2 = Math.floor((o.y + o.h + 2) / T);
  o.onGround = solid(lc,br2) || solid(rc,br2);
  o.x += o.vx;
  var tr2 = Math.floor(o.y / T);
  var br3 = Math.floor((o.y + o.h - 1) / T);
  if (o.vx > 0) {
    var r = Math.floor((o.x + o.w) / T);
    if (solid(r,tr2) || solid(r,br3)) { o.x=r*T-o.w; o.vx*=-1; }
  } else if (o.vx < 0) {
    var l = Math.floor(o.x / T);
    if (solid(l,tr2) || solid(l,br3)) { o.x=(l+1)*T; o.vx*=-1; }
  }
}
 
function overlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
 
function update() {
  frameCount++;
  var p = player;
  if (K['ArrowLeft']||K['KeyA'])       { p.vx=-SPD; p.facing=-1; }
  else if (K['ArrowRight']||K['KeyD']) { p.vx=SPD;  p.facing=1;  }
  else p.vx *= 0.55;
 
  if ((K['ArrowUp']||K['Space']||K['KeyZ']) && p.onGround) {
    p.vy=JUMPV; p.onGround=false;
  }
 
  moveObj(p);
  if (p.x < 0) p.x = 0;
  if (p.x > COLS*T-p.w) p.x = COLS*T-p.w;
  if (p.y > H+100) { loseLife(); return; }
  if (p.inv > 0) p.inv--;
 
  cam = p.x - W/3;
  if (cam < 0) cam = 0;
  if (cam > COLS*T-W) cam = COLS*T-W;
 
  for (var i=0; i<coinList.length; i++) {
    var cn = coinList[i];
    if (!cn.got && overlap(p,cn)) { cn.got=true; coins++; score+=100; updateHUD(); }
  }
 
  for (var j=0; j<enemies.length; j++) {
    var e = enemies[j];
    if (!e.alive) continue;
    if (e.squish > 0) { e.squish--; if(e.squish===0) e.alive=false; continue; }
    moveObj(e);
    if (e.x<=0) { e.x=0; e.vx=Math.abs(e.vx); }
    if (e.x>=COLS*T-e.w) { e.x=COLS*T-e.w; e.vx=-Math.abs(e.vx); }
    if (overlap(p,e)) {
      if (p.vy>0 && p.y+p.h < e.y+e.h*0.6) {
        e.squish=15; score+=200; updateHUD(); p.vy=-8;
      } else if (p.inv===0) {
        loseLife(); return;
      }
    }
  }
 
  if (p.x > (COLS-4)*T) {
    score+=500; updateHUD(); isRunning=false;
    showMsg('GANASTE!','Puntos: '+score,'Jugar de nuevo',function(){ initState(); isRunning=true; gameLoop(); });
  }
}
 
function loseLife() {
  lives--; updateHUD();
  if (lives<=0) {
    isRunning=false;
    showMsg('GAME OVER','Puntos: '+score,'Reintentar',function(){ initState(); isRunning=true; gameLoop(); });
    return;
  }
  player.x=60; player.y=320; player.vx=0; player.vy=0; player.inv=100; cam=0;
}
 
function showMsg(title, sub, btnTxt, cb) {
  var ov = document.getElementById('overlay');
  ov.innerHTML = '<h2>'+title+'</h2><p>'+sub+'</p><button class="btn" id="ovb">'+btnTxt+'</button>';
  ov.style.display = 'flex';
  document.getElementById('ovb').addEventListener('click', function() {
    ov.style.display='none'; cb();
  });
}
 
function drawBG() {
  ctx.fillStyle='#5C94FC'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.85)';
  var cx1=((80  - cam*0.2)%1200+1200)%1200;
  var cx2=((380 - cam*0.2)%1200+1200)%1200;
  var cx3=((700 - cam*0.2)%1200+1200)%1200;
  cloud(cx1,55); cloud(cx2,40); cloud(cx3,65);
  ctx.fillStyle='#4a8a3a';
  hill(((180-cam*0.4)%900+900)%900, 400, 130);
  hill(((480-cam*0.4)%900+900)%900, 390, 100);
  hill(((720-cam*0.4)%900+900)%900, 405, 120);
}
function cloud(x,y) {
  ctx.beginPath(); ctx.ellipse(x,y,36,17,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+26,y-9,26,15,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x-20,y-4,20,12,0,0,Math.PI*2); ctx.fill();
}
function hill(x,y,r) {
  ctx.beginPath(); ctx.arc(x,y,r,Math.PI,0); ctx.fill();
}
 
function drawTiles() {
  var c0 = Math.max(0, Math.floor(cam/T)-1);
  var c1 = Math.min(COLS-1, c0+Math.ceil(W/T)+2);
  for (var row=0; row<ROWS; row++) {
    for (var col=c0; col<=c1; col++) {
      var t = tile(col,row);
      var px = col*T-cam, py = row*T;
      if (t==='G') {
        ctx.fillStyle='#8B4513'; ctx.fillRect(px,py,T,T);
        ctx.fillStyle='#3aaa3a'; ctx.fillRect(px,py,T,10);
        ctx.strokeStyle='#5a2e00'; ctx.lineWidth=1; ctx.strokeRect(px,py,T,T);
      } else if (t==='B') {
        ctx.fillStyle='#C0652B'; ctx.fillRect(px,py,T,T);
        ctx.strokeStyle='#8B3A00'; ctx.lineWidth=2; ctx.strokeRect(px,py,T,T);
        ctx.beginPath();
        ctx.moveTo(px,py+T/2); ctx.lineTo(px+T,py+T/2);
        ctx.moveTo(px+T/2,py); ctx.lineTo(px+T/2,py+T/2);
        ctx.moveTo(px+T*0.75,py+T/2); ctx.lineTo(px+T*0.75,py+T);
        ctx.stroke();
      } else if (t==='P') {
        ctx.fillStyle='#3aaa3a'; ctx.fillRect(px-2,py,T+4,T);
        ctx.fillStyle='#1a8a1a'; ctx.fillRect(px-2,py,T+4,14);
        ctx.strokeStyle='#145214'; ctx.lineWidth=2; ctx.strokeRect(px-2,py,T+4,T);
      } else if (t==='p') {
        ctx.fillStyle='#2a8a2a'; ctx.fillRect(px+2,py,T-4,T);
        ctx.strokeStyle='#145214'; ctx.lineWidth=1; ctx.strokeRect(px+2,py,T-4,T);
      }
    }
  }
}
 
function drawCoins() {
  var bob = Math.sin(frameCount*0.1)*3;
  for (var i=0; i<coinList.length; i++) {
    var cn = coinList[i];
    if (cn.got) continue;
    var sx = cn.x-cam;
    if (sx<-30||sx>W+30) continue;
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.ellipse(sx+12,cn.y+12+bob,11,13,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFA500';
    ctx.beginPath(); ctx.ellipse(sx+12,cn.y+12+bob,5,8,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#CC8800'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(sx+12,cn.y+12+bob,11,13,0,0,Math.PI*2); ctx.stroke();
  }
}
 
function drawPlayer() {
  var p = player;
  if (p.inv>0 && Math.floor(p.inv/5)%2===0) return;
  var sx = p.x-cam;
  ctx.save();
  ctx.translate(sx+p.w/2, p.y+p.h/2);
  if (p.facing<0) ctx.scale(-1,1);
  ctx.fillStyle='#3A1A00'; ctx.fillRect(-15,14,13,8); ctx.fillRect(3,14,13,8);
  ctx.fillStyle='#2255CC'; ctx.fillRect(-14,2,28,16);
  ctx.fillStyle='#3366EE'; ctx.fillRect(-6,2,5,14); ctx.fillRect(2,2,5,14);
  ctx.fillStyle='#DD2222'; ctx.fillRect(-13,-16,26,20);
  ctx.fillStyle='#FFCC99'; ctx.fillRect(-10,-34,20,20);
  ctx.fillStyle='#CC1111'; ctx.fillRect(-12,-40,24,8); ctx.fillRect(-9,-50,17,12);
  ctx.fillStyle='#222'; ctx.fillRect(2,-30,5,5);
  ctx.fillStyle='#FFAA77'; ctx.fillRect(-2,-24,8,5);
  ctx.fillStyle='#5C2E00'; ctx.fillRect(-9,-22,19,5);
  ctx.restore();
}
 
function drawEnemies() {
  for (var j=0; j<enemies.length; j++) {
    var e = enemies[j];
    if (!e.alive) continue;
    var sx = e.x-cam;
    if (sx<-50||sx>W+50) continue;
    ctx.save();
    ctx.translate(sx+e.w/2, e.y+e.h/2);
    if (e.squish>0) ctx.scale(1.5,0.25);
    ctx.fillStyle='#8B4513';
    ctx.beginPath(); ctx.ellipse(0,0,14,13,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#5C2E00'; ctx.fillRect(-15,8,12,7); ctx.fillRect(5,8,12,7);
    ctx.fillStyle='#fff'; ctx.fillRect(-9,-8,7,7); ctx.fillRect(4,-8,7,7);
    ctx.fillStyle='#000'; ctx.fillRect(-7,-6,4,4); ctx.fillRect(6,-6,4,4);
    ctx.save(); ctx.rotate(-0.4); ctx.fillStyle='#000'; ctx.fillRect(-9,-13,9,3); ctx.restore();
    ctx.save(); ctx.rotate(0.4);  ctx.fillStyle='#000'; ctx.fillRect(2,-13,9,3);  ctx.restore();
    ctx.restore();
  }
}
 
function drawFlag() {
  var fx=(COLS-3)*T-cam;
  ctx.fillStyle='#5C2E00'; ctx.fillRect(fx+16,7*T,6,4*T);
  ctx.fillStyle='#E83030';
  ctx.beginPath();
  ctx.moveTo(fx+22,7*T);
  ctx.lineTo(fx+22+Math.sin(frameCount*0.1)*3+48, 7*T+20);
  ctx.lineTo(fx+22, 7*T+40);
  ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='20px monospace';
  ctx.fillText('*',fx+10, 7*T-4);
}
 
function render() {
  ctx.clearRect(0,0,W,H);
  drawBG(); drawTiles(); drawFlag(); drawCoins(); drawEnemies(); drawPlayer();
}
 
function gameLoop() {
  if (!isRunning) return;
  update(); render();
  requestAnimationFrame(gameLoop);
}
 
function startGame() {
  document.getElementById('overlay').style.display='none';
  initState();
  isRunning = true;
  gameLoop();
}
 
document.getElementById('startBtn').addEventListener('click', startGame);
 
})();
</script>
</body>
</html>
