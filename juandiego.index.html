<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JUAN DIEGO ES EL MEJOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold2: #FFA500;
      --dark: #0a0a0a;
      --red: #ff2a2a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Black Ops One', cursive;
    }

    /* Fondo animado */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(255,215,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255,42,42,0.08) 0%, transparent 60%);
      animation: bgPulse 4s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgPulse {
      from { opacity: 0.5; }
      to { opacity: 1; }
    }

    /* Partículas de estrellas */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--gold);
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.1; transform: scale(0.5); }
      to   { opacity: 1;   transform: scale(1.5); }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    /* Corona */
    .crown {
      font-size: 6rem;
      animation: bounce 1.5s ease-in-out infinite;
      display: block;
      filter: drop-shadow(0 0 20px var(--gold));
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50%       { transform: translateY(-20px) rotate(5deg); }
    }

    /* Nombre principal */
    .name {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(4rem, 15vw, 10rem);
      line-height: 0.9;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 40%, #FFD700 60%, #FF8C00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px rgba(255,215,0,0.5));
      animation: nameGlow 2s ease-in-out infinite alternate;
      letter-spacing: 4px;
    }

    @keyframes nameGlow {
      from { filter: drop-shadow(0 0 20px rgba(255,215,0,0.4)); }
      to   { filter: drop-shadow(0 0 50px rgba(255,215,0,0.9)); }
    }

    /* Subtítulo */
    .subtitle {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(1.5rem, 5vw, 3rem);
      color: #fff;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin: 0.5rem 0 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Badge EL MEJOR */
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--red), #cc0000);
      color: #fff;
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 7vw, 5rem);
      letter-spacing: 6px;
      padding: 0.3em 1em;
      border: 4px solid var(--gold);
      position: relative;
      animation: badgePulse 1s ease-in-out infinite alternate, fadeUp 0.8s ease forwards 1s;
      opacity: 0;
      box-shadow: 0 0 30px rgba(255,42,42,0.5), inset 0 0 20px rgba(0,0,0,0.3);
    }

    .badge::before,
    .badge::after {
      content: '★';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 1.5rem;
      animation: spinStar 2s linear infinite;
    }
    .badge::before { left: -2rem; }
    .badge::after  { right: -2rem; }

    @keyframes spinStar {
      from { transform: translateY(-50%) rotate(0deg); }
      to   { transform: translateY(-50%) rotate(360deg); }
    }

    @keyframes badgePulse {
      from { box-shadow: 0 0 20px rgba(255,42,42,0.4); }
      to   { box-shadow: 0 0 60px rgba(255,42,42,0.9); }
    }

    /* Frase CSM */
    .csm {
      margin-top: 2rem;
      font-family: 'Oswald', sans-serif;
      font-size: clamp(0.9rem, 2.5vw, 1.4rem);
      color: rgba(255,215,0,0.6);
      letter-spacing: 12px;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1.5s;
    }

    /* Barra de progreso "nivel" */
    .level-bar {
      margin-top: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 2s;
    }

    .level-label {
      font-family: 'Oswald', sans-serif;
      color: var(--gold);
      font-size: 0.9rem;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
    }

    .bar-track {
      width: min(400px, 80vw);
      height: 14px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      border: 1px solid rgba(255,215,0,0.3);
      margin: 0 auto;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold2), var(--gold), #fff8aa);
      border-radius: 999px;
      animation: fillBar 2.5s ease forwards 2.2s;
      box-shadow: 0 0 10px var(--gold);
    }

    @keyframes fillBar {
      to { width: 100%; }
    }

    .bar-max {
      font-family: 'Oswald', sans-serif;
      color: #fff;
      font-size: 0.8rem;
      letter-spacing: 2px;
      margin-top: 0.4rem;
    }

    /* Línea decorativa */
    .divider {
      width: min(300px, 70vw);
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.5rem auto 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 2.5s;
    }
  </style>
</head>
<body>

  <!-- Estrellas de fondo -->
  <div class="stars" id="stars"></div>

  <div class="container">
    <span class="crown">👑</span>
    <div class="name">JUAN DIEGO</div>
    <div class="subtitle">El Único. El Inigualable.</div>
    <div class="badge">EL MEJOR</div>
    <div class="csm">C &nbsp; S &nbsp; M</div>

    <div class="level-bar">
      <div class="level-label">NIVEL DE GOAT</div>
      <div class="bar-track">
        <div class="bar-fill"></div>
      </div>
      <div class="bar-max">NIVEL MÁXIMO ALCANZADO 🔥</div>
    </div>

    <div class="divider"></div>
  </div>

  <script>
    // Generar estrellas aleatorias
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + 'vw';
      star.style.top  = Math.random() * 100 + 'vh';
      star.style.setProperty('--dur', (1 + Math.random() * 3) + 's');
      star.style.animationDelay = (Math.random() * 3) + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
